stream_over_http_enabled: true

server:
  http_listen_port: 3200
  log_level: info

# Receive traces via OTLP (HTTP + gRPC)
distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318
        grpc:
          endpoint: 0.0.0.0:4317

# Ingester settings
ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

# Compactor
compactor:
  compaction:
    block_retention: 72h          # Keep traces for 3 days
    compacted_block_retention: 1h

# Storage — local filesystem (swap to S3/GCS for production at scale)
storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
    pool:
      max_workers: 100
      queue_depth: 10000

# Expose metrics to Prometheus
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

# Enable span metrics & service graph generation
overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
      generate_native_histograms: both