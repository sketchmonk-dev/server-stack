global:
  smtp_smarthost: "${ALERTMANAGER_SMTP_HOST}"
  smtp_from: "${ALERTMANAGER_SMTP_FROM_ADDRESS}"
  smtp_auth_username: "${ALERTMANAGER_SMTP_USER}"
  smtp_auth_password: "${ALERTMANAGER_SMTP_PASSWORD}"
  smtp_require_tls: true
  resolve_timeout: 5m

route:
  receiver: email-alerts
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: email-alerts
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: email-alerts
    email_configs:
      - to: "you@yourdomain.com"
        send_resolved: true