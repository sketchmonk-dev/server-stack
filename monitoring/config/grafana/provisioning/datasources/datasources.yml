apiVersion: 1

datasources:
  # ── Prometheus ──────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo

  # ── Grafana Tempo ───────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    editable: true
    jsonData:
      httpMethod: GET
      serviceMap:
        datasourceUid: prometheus
      tracesToMetrics:
        datasourceUid: prometheus
        tags:
          - key: service.name
            value: service
          - key: job
        queries:
          - name: "Request rate"
            query: "rate(traces_spanmetrics_calls_total{$$__tags}[5m])"
          - name: "Error rate"
            query: "rate(traces_spanmetrics_calls_total{$$__tags, status_code='STATUS_CODE_ERROR'}[5m])"
          - name: "P95 latency"
            query: "histogram_quantile(0.95, sum(rate(traces_spanmetrics_duration_milliseconds_bucket{$$__tags}[5m])) by (le))"
      tracesToLogs:
        datasourceUid: ""   # set to Loki uid if you add Loki later
      search:
        hide: false
      nodeGraph:
        enabled: true
      lokiSearch:
        datasourceUid: ""