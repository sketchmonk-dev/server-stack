services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      # Disable noisy/rarely-needed metric groups to reduce cardinality
      - --disable_metrics=hugetlb,referenced_memory,cpu_topology,resctrl,udp,advtcp,memory_numa,tcp
      # If you DO want process-level metrics (file descriptors, threads, sockets):
      # - --enable_metrics=process
  # ─────────────────────────────────────────────
  # All-in-one LGTM + OTel Collector backend
  # Bundles: Grafana · Loki · Tempo · Prometheus
  #          Pyroscope · OTel Collector
  # ─────────────────────────────────────────────
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: lgtm
    restart: unless-stopped
    # No ports exposed - all traffic flows through Caddy
    expose:
      - "3000"   # Grafana
      - "4317"   # OTel gRPC
      - "4318"   # OTel HTTP
      - "9090"   # Prometheus
      - "4040"   # Pyroscope

    environment:
      # ── Logging (set to true for verbose output) ──────────────────────────
      - ENABLE_LOGS_GRAFANA=${ENABLE_LOGS_GRAFANA:-false}
      - ENABLE_LOGS_LOKI=${ENABLE_LOGS_LOKI:-false}
      - ENABLE_LOGS_PROMETHEUS=${ENABLE_LOGS_PROMETHEUS:-false}
      - ENABLE_LOGS_TEMPO=${ENABLE_LOGS_TEMPO:-false}
      - ENABLE_LOGS_PYROSCOPE=${ENABLE_LOGS_PYROSCOPE:-false}
      - ENABLE_LOGS_OTELCOL=${ENABLE_LOGS_OTELCOL:-false}
      - ENABLE_LOGS_ALL=${ENABLE_LOGS_ALL:-false}

      # ── OBI - eBPF auto-instrumentation (requires Linux 5.8+ with BTF) ───
      - ENABLE_OBI=${ENABLE_OBI:-false}
      - OBI_TARGET=${OBI_TARGET:-}

      # ── Forward telemetry to an external vendor (optional) ───────────────
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_EXPORTER_OTLP_HEADERS=${OTEL_EXPORTER_OTLP_HEADERS:-}

      # ── Grafana plugins & security ────────────────────────────────────────
      - GF_PLUGINS_PREINSTALL=${GF_PLUGINS_PREINSTALL:-}
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      # ── Grafana SMTP ───────────────────────────────
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${GF_SMTP_HOST}
      - GF_SMTP_USER=${GF_SMTP_USER}
      - GF_SMTP_PASSWORD=${GF_SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS}
      - GF_SMTP_FROM_NAME=${GF_SMTP_FROM_NAME:-Grafana}
      - GF_SMTP_STARTTLS_POLICY=${GF_SMTP_STARTTLS_POLICY:-MandatoryStartTLS}
      - GF_SMTP_SKIP_VERIFY=${GF_SMTP_SKIP_VERIFY:-false}

    volumes:
      - lgtm_data:/data
      - ./config/otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml

    # OBI requires host PID namespace + privileged mode (ignored if ENABLE_OBI=false)
    # Uncomment the two lines below when ENABLE_OBI=true
    # pid: host
    # privileged: true

    networks:
      - public
      - default

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q '\"database\": \"ok\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    labels:
      # ── Grafana UI ────────────────────────────────────────────────────────
      caddy_0: grafana.${DOMAIN}
      caddy_0.handle.reverse_proxy: "{{upstreams 3000}}"

      # ── Prometheus UI ─────────────────────────────────────────────────────
      caddy_1: prometheus.${DOMAIN}
      caddy_1.handle.reverse_proxy: "{{upstreams 9090}}"
      caddy_1.basicauth: "*"
      caddy_1.basicauth.admin: "${PROMETHEUS_HASHED_PASSWORD}"

      # ── Pyroscope UI ──────────────────────────────────────────────────────
      caddy_2: pyroscope.${DOMAIN}
      caddy_2.handle.reverse_proxy: "{{upstreams 4040}}"

volumes:
  lgtm_data:
    driver: local

networks:
  public:
    external: true
  default:
    name: monitoring