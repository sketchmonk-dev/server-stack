name: monitoring

services:

  # ──────────────────────────────────────────────
  # Prometheus — metrics scraper & storage
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
      - public
    labels:
      caddy: "prometheus.${DOMAIN}"
      caddy.basicauth: "*"
      caddy.basicauth.admin: "${PROMETHEUS_HASHED_PASSWORD}"
      caddy.handle.reverse_proxy: "{{upstreams http 9090}}"

  # ──────────────────────────────────────────────
  # Grafana — dashboards & visualization
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    environment:
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor traceToMetrics
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST}
      - GF_SMTP_USER=${SMTP_USER}
      - GF_SMTP_PASSWORD=${SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS}
      - GF_SMTP_FROM_NAME=${SMTP_FROM_NAME}
      - GF_SMTP_STARTTLS_POLICY=MandatoryStartTLS
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring
      - public
    depends_on:
      - prometheus
      - tempo
    labels:
      caddy: "grafana.${DOMAIN}"
      caddy.handle.reverse_proxy: "{{upstreams http 3000}}"

  # ──────────────────────────────────────────────
  # Grafana Tempo — distributed tracing backend
  # ──────────────────────────────────────────────
  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    restart: always
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    networks:
      - monitoring
    # Tempo ports (internal only — accessed via Grafana)
    # 4317: OTLP gRPC  |  4318: OTLP HTTP  |  3200: Tempo HTTP API

  # ──────────────────────────────────────────────
  # cAdvisor — container resource metrics
  # ──────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /cgroup:/cgroup:ro
    networks:
      - monitoring

  # ──────────────────────────────────────────────
  # Node Exporter — host system metrics
  # ──────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring
  
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: always
    environment:
      - ALERTMANAGER_SMTP_HOST=${SMTP_HOST}
      - ALERTMANAGER_SMTP_USER=${SMTP_USER}
      - ALERTMANAGER_SMTP_PASSWORD=${SMTP_PASSWORD}
      - ALERTMANAGER_SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS}
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - monitoring

volumes:
  prometheus_data:
    name: prometheus_data
  grafana_data:
    name: grafana_data
  tempo_data:
    name: tempo_data
  alertmanager_data:
    name: alertmanager_data

networks:
  monitoring:
    name: monitoring
  public:
    external: true